<span class="close">
    <ion-icon name="close-circle-outline"></ion-icon>
</span>
<form class="login-box">
    <h1>Login</h1>
    <div class="input">
        <input type="text" id="name" required>
        <label>Username</label>
        <ion-icon name="person-outline"></ion-icon>
    </div>
    <div class="input login-eye">
        <input type="password" id="password-login" required>
        <label>Password</label>
        <span>
            <ion-icon name="eye-off-outline" class="eye-off"></ion-icon>
            <ion-icon name="eye-outline" class="eye-open"></ion-icon>
            <ion-icon name="lock-closed-outline"></ion-icon>
        </span>
    </div>
    <div class="remenber-check">
        <span>
            <input type="checkbox" id="remenber">
            <label for="remenber" class="remenber-btn">Remenber me</label>
            </span>
        <h5 href="#">Forget password?</h5>
    </div>

    <button class="ready-btn">Submit</button>

    <div class="switch-box">
        <h5 class="register-link">Don't have an account ? Register</h5>
    </div>
</form>
<form class="register-box">
    <h1>Register</h1>
    <div class="input">
        <input type="text" id="name" required>
        <label>Username</label>
        <ion-icon name="person-outline"></ion-icon>
    </div>
    <div class="input">
        <input type="email" id="email" required>
        <label>Email</label>
        <ion-icon name="mail-outline"></ion-icon>
    </div>
    <div class="input register-eye">
        <input type="password" id="password-register" required>
        <label>Password</label>
        <span>
            <ion-icon name="eye-off-outline" class="eye-off"></ion-icon>
            <ion-icon name="eye-outline" class="eye-open"></ion-icon>
            <ion-icon name="lock-closed-outline"></ion-icon>
        </span>
    </div>
    <div class="input register-2-eye">
        <input type="password" id="password-check" required>
        <label>Password Check</label>
        <span>
            <ion-icon name="eye-off-outline" class="eye-off"></ion-icon>
            <ion-icon name="eye-outline" class="eye-open"></ion-icon>
            <ion-icon name="lock-closed-outline"></ion-icon>
        </span>
    </div>
    <div class="remenber-check">
        <span>
            <input type="checkbox" id="agree" required>
            <label for="agree" class="agree-btn">I agree to the terms & conditions</label>
        </span>
    </div>

    <button class="ready-btn">Register</button>

    <div class="switch-box">
        <h5 class="login-link">Register before ? Login</h5>
    </div>
</form>
